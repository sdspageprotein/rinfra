# =============================================================================
# rinfra — Cluster Main Node Configuration
# =============================================================================
# The main node is the cluster coordinator. It:
#   - Listens on a TCP port for worker registration and heartbeats
#   - Maintains a live registry of all connected worker nodes
#   - Typically hosts the HTTP admin panel for cluster management
#
# For the full field reference, see standalone.example.yaml
# =============================================================================

app:
  name: "rinfra-main"
  version: "0.1.0"

runtime:
  shutdown:
    grace_period_secs: 30
    component_timeout_secs: 10

plugins:

  log:
    stdout:
      enabled: true
      level: "info"
      format: "pretty"
    file:
      enabled: true
      path: "logs"
      filename: "main.log"
      rotation: "daily"
      max_files: 30
      level: "info"
      format: "json"

  net:
    listeners:
      - name: "main"
        protocol: "http"
        bind: "0.0.0.0:8080"
        http:
          middleware:
            cors:
              enabled: true
              allow_origins: ["*"]
            request_id:
              enabled: true
            timeout:
              enabled: true
              timeout_secs: 30
            auth:
              enabled: false
              jwt_secret_env: "RINFRA_JWT_SECRET"
              exclude_paths: ["/health", "/healthz", "/readyz", "/metrics"]
            rate_limit:
              enabled: false
              key_strategy: "ip"

  # ── Cluster (Main Role) ─────────────────────────────────────────────────
  cluster:
    mode: "cluster"               # Must be "cluster" for main node
    role: "main"                  # This node is the cluster coordinator
    main_address: "0.0.0.0:7946" # TCP address to listen on for worker connections
    cluster_token: "change-me-in-production"   # Shared secret (must match workers)
    ping_interval_secs: 10        # Expected heartbeat interval from workers

  cache:
    memory:
      enabled: true
      max_capacity: 10000
      ttl_secs: 300
    redis:
      enabled: false
      url: "redis://127.0.0.1:6379"

  store:
    postgres:
      enabled: false
      url: "postgres://localhost:5432/rinfra"
      max_connections: 10
      idle_timeout_secs: 300

  mq:
    backend: "memory"
    memory:
      channel_capacity: 1024

  timer:
    enabled: false
    engine: "simple"
    simple:
      max_concurrent: 4

  file_store:
    enabled: false
    backend: "local"
    local:
      root_dir: "data/files"

  http_client:
    enabled: false
    timeout_secs: 30
    user_agent: "rinfra/0.1.0"
    max_retries: 0
    retry_delay_ms: 500

  lock:
    enabled: false
    backend: "memory"
    redis:
      url: "redis://127.0.0.1:6379"
      key_prefix: "rinfra:lock:"

  config_watch:
    enabled: false
    poll_interval_secs: 5

  audit:
    enabled: false
    backend: "file"
    file:
      path: "logs/audit.jsonl"

  i18n:
    enabled: false
    dir: "i18n"
    default_locale: "en"

  metrics:
    enabled: true
    endpoint: "/metrics"

  health:
    enabled: true

  telemetry:
    enabled: false
    otlp_endpoint: "http://localhost:4317"
    sample_ratio: 1.0
    export_timeout_secs: 10

  admin:
    enabled: true
    static_dir: "rinfra-admin/frontend/dist"
    auth:
      enabled: false              # Recommended: enable in production
      token_file: "data/admin_tokens.json"
      root_token_env: "RINFRA_ROOT_TOKEN"
      exclude_paths:
        - "/api/admin/health"

business: {}
