# =============================================================================
# rinfra — Cluster Worker Node Configuration
# =============================================================================
# Worker nodes connect to the main node via persistent TCP to:
#   - Register themselves with node_id and metadata
#   - Send periodic heartbeats (ping/pong)
#   - Receive live node list updates from the main node
#
# Each worker can expose any combination of listeners (HTTP, TCP, gRPC, tRPC).
# The listener endpoints are automatically reported to the main node for
# service discovery by other nodes.
#
# For the full field reference, see standalone.example.yaml
# =============================================================================

app:
  name: "rinfra-worker"
  version: "0.1.0"

runtime:
  shutdown:
    grace_period_secs: 30
    component_timeout_secs: 10

plugins:

  log:
    stdout:
      enabled: true
      level: "info"
      format: "pretty"
    file:
      enabled: true
      path: "logs"
      filename: "worker.log"
      rotation: "daily"
      max_files: 30
      level: "info"
      format: "json"

  # ── Network Listeners ───────────────────────────────────────────────────
  # Configure based on the worker's role. Common patterns:
  net:
    listeners:
      # Pattern A: HTTP API server
      # - name: "api"
      #   protocol: "http"
      #   bind: "0.0.0.0:8080"
      #   http:
      #     middleware:
      #       cors: { enabled: true, allow_origins: ["*"] }
      #       timeout: { enabled: true, timeout_secs: 30 }
      #       auth: { enabled: true, jwt_secret_env: "RINFRA_JWT_SECRET" }

      # Pattern B: HTTP + WebSocket (gateway service)
      # - name: "gate"
      #   protocol: "http"
      #   bind: "0.0.0.0:8080"
      #   http:
      #     middleware:
      #       cors: { enabled: true, allow_origins: ["*"] }
      #       timeout: { enabled: true, timeout_secs: 30 }
      #     ws:
      #       enabled: true
      #       ping_interval_secs: 30
      #       ping_timeout_secs: 10

      # Pattern C: TCP game server
      # - name: "game-tcp"
      #   protocol: "tcp"
      #   bind: "0.0.0.0:9100"
      #   tcp:
      #     codec: "protobuf"
      #     max_frame_size: 65536
      #     pipeline:
      #       - transform: "lz4"

      # Pattern D: gRPC microservice                       [feature: grpc]
      # - name: "rpc-grpc"
      #   protocol: "grpc"
      #   bind: "0.0.0.0:9090"

      # Pattern E: tRPC internal communication
      # - name: "internal-trpc"
      #   protocol: "trpc"
      #   bind: "0.0.0.0:9300"
      #   tcp:
      #     max_frame_size: 65536

  # ── Cluster (Worker Role) ───────────────────────────────────────────────
  cluster:
    mode: "cluster"               # Must be "cluster" for worker node
    role: "worker"                # This node connects to the main coordinator
    node_id: ""                   # Unique node ID (auto-generated UUID if empty)
    main_address: "127.0.0.1:7946"   # TCP address of the main node
    cluster_token: "change-me-in-production"   # Must match the main node's token
    ping_interval_secs: 10        # Heartbeat interval to the main node

  cache:
    memory:
      enabled: true
      max_capacity: 10000
      ttl_secs: 300

  store:
    postgres:
      enabled: false
      url: "postgres://localhost:5432/rinfra"
      max_connections: 10
      idle_timeout_secs: 300

  mq:
    backend: "memory"
    memory:
      channel_capacity: 1024

  timer:
    enabled: false
    engine: "simple"
    simple:
      max_concurrent: 4

  file_store:
    enabled: false
    backend: "local"
    local:
      root_dir: "data/files"

  http_client:
    enabled: false
    timeout_secs: 30
    user_agent: "rinfra/0.1.0"
    max_retries: 0
    retry_delay_ms: 500

  lock:
    enabled: false
    backend: "memory"
    redis:
      url: "redis://127.0.0.1:6379"
      key_prefix: "rinfra:lock:"

  config_watch:
    enabled: false
    poll_interval_secs: 5

  audit:
    enabled: false
    backend: "file"
    file:
      path: "logs/audit.jsonl"

  i18n:
    enabled: false
    dir: "i18n"
    default_locale: "en"

  metrics:
    enabled: false                # Workers typically don't need metrics endpoint

  health:
    enabled: true

  telemetry:
    enabled: false
    otlp_endpoint: "http://localhost:4317"
    sample_ratio: 1.0
    export_timeout_secs: 10

  # Workers typically don't need the admin panel
  admin:
    enabled: false

business: {}
