# =============================================================================
# rinfra example: web backend node
# =============================================================================
# Serves a simple welcome page. Registers with the cluster main node so that
# the proxy can discover it via the cluster node list.

app:
  name: example-web
  version: 0.1.0

runtime:
  shutdown:
    grace_period_secs: 10
    component_timeout_secs: 5

plugins:
  log:
    stdout:
      enabled: true
      level: info
      format: pretty

  net:
    listeners:
      - name: "main"
        protocol: http
        bind: "0.0.0.0:8081"
        http:
          middleware:
            request_id:
              enabled: true
            timeout:
              enabled: true
              timeout_secs: 30

  cluster:
    mode: cluster
    role: worker
    node_id: "web-1"
    main_address: "127.0.0.1:9000"
    cluster_token: "dev-cluster-token"
    ping_interval_secs: 5

  health:
    enabled: true

business: {}
